<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | Dark Mode</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-body: #0f172a;
      --bg-card: #1e293b;
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #38bdf8;
      --border: #334155;
      
      --status-pending: #fbbf24;
      --status-done: #22c55e;
      --status-cancel: #ef4444;
      
      --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }

    body {
      background-color: var(--bg-body);
      color: var(--text-main);
      padding: 1.5rem;
      line-height: 1.5;
    }

    .container { max-width: 1200px; margin: 0 auto; }

    /* Header & Stats */
    header { margin-bottom: 2rem; }
    h1 { font-size: 1.5rem; font-weight: 700; color: var(--accent); }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: var(--shadow);
    }

    .stat-val { font-size: 2rem; font-weight: 700; margin-top: 0.5rem; }

    /* Custom Chart */
    .chart-box {
      display: flex;
      align-items: flex-end;
      gap: 1.5rem;
      height: 120px;
      padding-top: 1rem;
    }
    .bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; height: 100%; justify-content: flex-end; }
    .bar { width: 100%; max-width: 40px; border-radius: 6px 6px 0 0; transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
    .bar-label { font-size: 0.75rem; color: var(--text-muted); }

    /* Tables */
    .table-container { overflow-x: auto; margin-top: 1rem; }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    th { text-align: left; padding: 1rem; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); }
    td { padding: 1rem; border-bottom: 1px solid var(--border); font-size: 0.875rem; }
    
    .cust-name { font-weight: 600; display: block; }
    .cust-sub { font-size: 0.75rem; color: var(--text-muted); }

    /* Badges & Buttons */
    .badge { padding: 0.25rem 0.6rem; border-radius: 6px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
    .badge.pending { background: rgba(251, 191, 36, 0.1); color: var(--status-pending); }
    .badge.done { background: rgba(34, 197, 94, 0.1); color: var(--status-done); }
    .badge.cancel { background: rgba(239, 68, 68, 0.1); color: var(--status-cancel); }

    .actions { display: flex; gap: 0.5rem; }
    .btn {
      background: #334155;
      color: white;
      border: none;
      padding: 0.5rem;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn:hover { background: var(--accent); color: var(--bg-body); }
    .btn-del:hover { background: var(--status-cancel); }

    /* Loader */
    #loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 3px;
      background: var(--accent);
      z-index: 2000;
      transition: transform 0.3s;
      transform: scaleX(0);
      transform-origin: left;
    }
    .loading #loader { transform: scaleX(1); }

    .empty { text-align: center; padding: 2rem; color: var(--text-muted); font-style: italic; }
    .hidden { display: none; }
  </style>
</head>
<body class="loading">

  <div id="loader"></div>

  <div class="container">
    <header>
      <h1>ZEESHAN ELECTRIC BOOKINGS</h1>
      <p style="color: var(--text-muted)">Real-time service management</p>
    </header>

    <div class="stats-row">
      <div class="card">
        <p style="color: var(--text-muted); font-size: 0.8rem;">Total Requests</p>
        <div class="stat-val" id="count-total">0</div>
      </div>
      <div class="card">
        <div class="chart-box">
          <div class="bar-group">
            <div class="bar" id="bar-p" style="height: 0%; background: var(--status-pending)"></div>
            <span class="bar-label">Pending</span>
          </div>
          <div class="bar-group">
            <div class="bar" id="bar-d" style="height: 0%; background: var(--status-done)"></div>
            <span class="bar-label">Done</span>
          </div>
          <div class="bar-group">
            <div class="bar" id="bar-c" style="height: 0%; background: var(--status-cancel)"></div>
            <span class="bar-label">Cancel</span>
          </div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom: 2rem;">
      <h3 style="margin-bottom: 1rem;">Incoming Requests</h3>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Customer</th>
              <th>Service</th>
              <th>Description</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="active-tbody"></tbody>
        </table>
        <div id="active-empty" class="empty hidden">No pending bookings</div>
      </div>
    </div>

    <div class="card">
      <h3 style="margin-bottom: 1rem; color: var(--text-muted)">Archive & History</h3>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Customer</th>
              <th>Service</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="history-tbody"></tbody>
        </table>
        <div id="history-empty" class="empty hidden">No history available</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // --- PASTE YOUR CONFIG HERE ---
    const firebaseConfig = {
  apiKey: "AIzaSyB6sL6Ssv8Go0B-gCseNRV9X1qgyO8br6s",
  authDomain: "zeeshan-electric.firebaseapp.com",
  projectId: "zeeshan-electric",
  storageBucket: "zeeshan-electric.firebasestorage.app",
  messagingSenderId: "1096626194064",
  appId: "1:1096626194064:web:7b085332941be9f4513a15",
  measurementId: "G-YCQ848BG5L"
};
    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadBookings() {
      document.body.classList.add('loading');
      const activeTbody = document.getElementById("active-tbody");
      const historyTbody = document.getElementById("history-tbody");
      
      activeTbody.innerHTML = "";
      historyTbody.innerHTML = "";

      let counts = { pending: 0, done: 0, cancel: 0, total: 0 };

      try {
        const snap = await getDocs(collection(db, "bookings"));
        
        snap.forEach(res => {
          const data = res.data();
          const id = res.id;
          counts.total++;
          counts[data.status]++;

          const row = document.createElement("tr");
          
          if (data.status === "pending") {
            row.innerHTML = `
              <td><span class="cust-name">${data.customer.name}</span><span class="cust-sub">${data.customer.phone}</span></td>
              <td>${data.service.label}</td>
              <td><p style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${data.service.description || '-'}</p></td>
              <td><span class="badge pending">Pending</span></td>
              <td class="actions">
                <button class="btn" onclick="updateStatus('${id}', 'done')"><i class="fa-solid fa-check"></i></button>
                <button class="btn" onclick="updateStatus('${id}', 'cancel')"><i class="fa-solid fa-xmark"></i></button>
                <button class="btn btn-del" onclick="removeBooking('${id}')"><i class="fa-solid fa-trash"></i></button>
              </td>
            `;
            activeTbody.appendChild(row);
          } else {
            row.innerHTML = `
              <td><span class="cust-name">${data.customer.name}</span><span class="cust-sub">${data.customer.phone}</span></td>
              <td>${data.service.label}</td>
              <td><span class="badge ${data.status}">${data.status}</span></td>
              <td><button class="btn btn-del" onclick="removeBooking('${id}')"><i class="fa-solid fa-trash"></i></button></td>
            `;
            historyTbody.appendChild(row);
          }
        });

        updateUI(counts);
      } catch (e) {
        console.error(e);
      }
      document.body.classList.remove('loading');
    }

    function updateUI(c) {
      document.getElementById("count-total").innerText = c.total;
      const max = Math.max(c.pending, c.done, c.cancel, 1);
      
      document.getElementById("bar-p").style.height = (c.pending / max * 100) + "%";
      document.getElementById("bar-d").style.height = (c.done / max * 100) + "%";
      document.getElementById("bar-c").style.height = (c.cancel / max * 100) + "%";

      document.getElementById("active-empty").classList.toggle('hidden', c.pending > 0);
      document.getElementById("history-empty").classList.toggle('hidden', (c.done + c.cancel) > 0);
    }

    // Global listeners for the buttons
    window.updateStatus = async (id, status) => {
      await updateDoc(doc(db, "bookings", id), { status });
      loadBookings();
    };

    window.removeBooking = async (id) => {
      if(confirm("Delete permanently?")) {
        await deleteDoc(doc(db, "bookings", id));
        loadBookings();
      }
    };

    // Run
    loadBookings();
  </script>
</body>
</html>
